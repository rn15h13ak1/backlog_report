# ============================================================
# Backlog 週次レポート 設定ファイル
# ============================================================
# このファイルを編集して、あなたの環境に合わせてください

backlog:
  # スペースのホスト名またはIPアドレス
  # クラウド版の例: yourcompany.backlog.com
  # オンプレミス版の例: 192.168.1.100
  space_host: "yourcompany.backlog.com"

  # オンプレミス版でパスプレフィックスがある場合に指定
  # 例: URL が https://192.168.1.100/backlog/projects/... の場合は "/backlog" を設定
  # クラウド版（backlog.com）の場合は空文字列のまま（または省略）
  base_path: ""

  # Backlog API キー（個人設定ページから取得）
  # 取得場所: Backlog画面右上 → 個人設定 → API → APIキーの発行
  api_key: "YOUR_API_KEY_HERE"

  # 集計対象のプロジェクトキー（例: MYPROJECT）
  # プロジェクトキーはBacklogのURL（/projects/XXXXX）から確認できます
  project_key: "YOUR_PROJECT_KEY"

  # SSL証明書の検証（通常は true のまま）
  # 自己署名証明書を使用したクローズド環境では false に設定してください
  ssl_verify: true

report:
  # ============================================================
  # 期間設定（優先順位: コマンドライン引数 > period > target_week）
  # ============================================================

  # ① 期間を直接指定する場合（最もシンプル）
  #    from / to を両方指定すると target_week より優先されます。
  #    集計しない週は都度ここを書き換えてから実行してください。
  #    コメントアウト（#）すると target_week の自動計算が使われます。
  # period:
  #   from: "2026-03-01"
  #   to:   "2026-03-31"

  # ② 自動計算（period が未指定のときに使われる）
  # "previous" = 前週（月〜日）を集計
  # "current"  = 今週（月曜〜今日まで）を集計
  target_week: "previous"

  # 週の開始曜日
  # 英語: monday, tuesday, wednesday, thursday, friday, saturday, sunday
  # 日本語: 月, 火, 水, 木, 金, 土, 日（または 月曜, 火曜, ...）
  week_start: "monday"

  # レポートの出力先ディレクトリ（相対パスまたは絶対パス）
  output_dir: "./reports"

  # ステータス設定
  # 未完了とみなすステータスID（1:未対応, 2:処理中）
  open_status_ids: [1, 2]
  # 完了とみなすステータスID（3:処理済み, 4:完了）
  closed_status_ids: [3, 4]

# ============================================================
# フィルター設定
# ============================================================
# 種別・カスタム属性ごとに複数のフィルターを定義できます。
# フィルターごとに個別のMarkdownレポートファイルが生成されます。
#
# filters を省略または空にすると、フィルターなし（全課題）で1件のレポートを生成します。
# ============================================================

filters:
  # ---- フィルター例1: 種別のみで絞り込む ----
  - name: "バグ対応"                   # レポートファイル名・見出しに使われます
    description: "バグ種別の課題集計"   # 任意のメモ（レポートに記載されます）
    issue_types:                        # Backlogの「種別」名を指定（複数指定でOR条件）
      - "バグ"
    # custom_fields は省略 → カスタム属性フィルターなし

  # ---- フィルター例2: 種別＋カスタム属性で絞り込む ----
  - name: "Aチーム_タスク"
    description: "AチームのタスクおよびAチームへの要望"
    issue_types:
      - "タスク"
      - "要望"
    custom_fields:
      - field_name: "対応チーム"        # Backlogのカスタム属性名を指定
        values:                         # 一致させたい値のリスト（複数指定でOR条件）
          - "Aチーム"

  # ---- フィルター例3: カスタム属性のみで絞り込む ----
  - name: "優先度_高"
    description: "優先度が高または最高の全種別課題"
    # issue_types は省略 → 全種別が対象
    custom_fields:
      - field_name: "優先度"
        values:
          - "高"
          - "最高"

  # ---- フィルター例4: 複数のカスタム属性でAND絞り込み ----
  - name: "Bチーム_リリース済み"
    description: "BチームでリリースフラグがONの課題"
    custom_fields:
      - field_name: "担当チーム"
        values:
          - "Bチーム"
      - field_name: "リリース済み"      # 複数のカスタム属性はAND条件になります
        values:
          - "ON"

  # ---- カスタム属性をIDで直接指定する場合 ----
  # field_name の代わりに field_id（数値）を使うこともできます。
  # IDはBacklogのカスタム属性設定ページのURLから確認できます。
  # - name: "IDで指定する例"
  #   custom_fields:
  #     - field_id: 12345
  #       values:
  #         - "対象値"
